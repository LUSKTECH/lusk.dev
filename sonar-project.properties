# SonarQube Configuration
# Replace placeholders with your actual SonarQube project details

sonar.projectKey=YOUR_PROJECT_KEY
sonar.organization=YOUR_ORGANIZATION

sonar.projectName=Website Template
sonar.projectVersion=1.0.0

# Source configuration
sonar.sources=src
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.property.test.ts

# TypeScript/JavaScript configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,coverage/**,.next/**,out/**,public/**,**/*.config.js,**/*.config.ts,**/*.config.mjs

# Encoding
sonar.sourceEncoding=UTF-8
